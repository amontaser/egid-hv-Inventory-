{% extends "base.html" %}
{% block title %}Add Client{% endblock %}
{% block content %}
<div class="container-fluid py-4">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card">
                <div class="card-header"><h5 class="mb-0">Add New Client</h5></div>
                <div class="card-body">
                    <form method="POST">
                        <div class="mb-3"><label class="form-label">Name *</label><input type="text" class="form-control" name="name" required></div>
                        <div class="mb-3"><label class="form-label">Website</label><input type="url" class="form-control" name="website"></div>
                        <div class="mb-3"><label class="form-label">Country</label><input type="text" class="form-control" name="country"></div>
                        <div class="mb-3">
                            <label class="form-label">Account Managers</label>
                            <select class="form-select" name="account_managers" multiple size="4">
                                {% for manager in managers %}
                                <option value="{{ manager.id }}">{{ manager.name }}</option>
                                {% endfor %}
                            </select>
                            <small class="text-muted">Hold Ctrl/Cmd to select multiple managers</small>
                        </div>
                        <div class="mb-3"><label class="form-label">Description</label><textarea class="form-control" name="description" rows="3"></textarea></div>
                        <div class="mb-4"><label class="form-label">Status</label><select class="form-select" name="state"><option value="1">Active</option><option value="0">Inactive</option></select></div>
                        <button type="submit" class="btn btn-primary">Create</button>
                        <a href="/clients" class="btn btn-outline-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
