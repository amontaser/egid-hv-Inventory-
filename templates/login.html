<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hyper-V Inventory</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * { font-family: 'Inter', sans-serif; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            background: linear-gradient(135deg, #0d1b2a 0%, #1b2a3b 40%, #0f3460 100%);
            position: relative;
            overflow: hidden;
        }

        /* Animated grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(13,110,253,0.07) 1px, transparent 1px),
                linear-gradient(90deg, rgba(13,110,253,0.07) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
        }

        /* Glowing orbs */
        body::after {
            content: '';
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(13,110,253,0.15) 0%, transparent 70%);
            top: -150px;
            right: -150px;
            z-index: 0;
        }

        .orb2 {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(102,126,234,0.12) 0%, transparent 70%);
            bottom: -100px;
            left: -100px;
            z-index: 0;
            pointer-events: none;
        }

        .container { position: relative; z-index: 1; }

        .login-card { max-width: 420px; width: 100%; margin: 0 auto; }

        .card {
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(20px);
            border-radius: 1rem;
        }

        .login-icon-wrap {
            width: 64px;
            height: 64px;
            border-radius: 1rem;
            background: linear-gradient(135deg, #0d6efd, #0099ff);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.25rem;
            box-shadow: 0 8px 24px rgba(13,110,253,0.35);
        }

        .login-icon-wrap i { font-size: 2rem; color: #fff; }

        .form-control-lg { font-size: 0.95rem; border-radius: 0.6rem; }
        .form-control-lg:focus { box-shadow: 0 0 0 3px rgba(13,110,253,0.15); border-color: #0d6efd; }

        .btn-primary {
            background: linear-gradient(135deg, #0d6efd, #0099ff);
            border: none;
            border-radius: 0.6rem;
            font-weight: 600;
            letter-spacing: 0.3px;
            padding: 0.75rem;
            transition: all 0.2s;
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(13,110,253,0.4); }

        .input-group .btn-outline-secondary {
            border-color: #dee2e6;
            border-left: none;
            border-radius: 0 0.6rem 0.6rem 0;
            color: #6c757d;
        }
        .input-group .btn-outline-secondary:hover { background: #f8f9fa; color: #333; }
        .input-group .form-control-lg { border-radius: 0.6rem 0 0 0.6rem; border-right: none; }
        .input-group .form-control-lg:focus { border-right: none; z-index: 3; }

        .brand-tag {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.45);
            margin-top: 1.5rem;
        }
        .brand-tag i { font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="orb2"></div>
    <div class="container">
        <div class="login-card">
            <div class="card shadow-lg border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <div class="login-icon-wrap">
                            <i class="bi bi-hdd-stack"></i>
                        </div>
                        <h1 class="h4 fw-700 mb-1">Hyper-V Inventory</h1>
                        <p class="text-muted small mb-0">Sign in to your management console</p>
                    </div>

                    {% if error %}
                    <div class="alert alert-danger d-flex align-items-center gap-2 py-2" role="alert">
                        <i class="bi bi-exclamation-circle-fill"></i>
                        <span>{{ error }}</span>
                    </div>
                    {% endif %}

                    <form method="POST" autocomplete="on">
                        <div class="mb-3">
                            <label for="username" class="form-label fw-500 small">Username</label>
                            <input type="text" class="form-control form-control-lg" id="username" name="username"
                                   placeholder="Enter username" required autofocus autocomplete="username">
                        </div>
                        <div class="mb-4">
                            <label for="password" class="form-label fw-500 small">Password</label>
                            <div class="input-group">
                                <input type="password" class="form-control form-control-lg" id="password" name="password"
                                       placeholder="Enter password" required autocomplete="current-password">
                                <button class="btn btn-outline-secondary" type="button" id="togglePassword"
                                        title="Show/hide password" tabindex="-1">
                                    <i class="bi bi-eye" id="togglePasswordIcon"></i>
                                </button>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary btn-lg w-100">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
                        </button>
                    </form>
                </div>
            </div>
            <div class="text-center">
                <span class="brand-tag">
                    <i class="bi bi-shield-lock"></i> Hyper-V Inventory Management System
                </span>
            </div>
        </div>
    </div>

    <script>
        const toggleBtn = document.getElementById('togglePassword');
        const pwdInput = document.getElementById('password');
        const toggleIcon = document.getElementById('togglePasswordIcon');

        toggleBtn.addEventListener('click', () => {
            const isPassword = pwdInput.type === 'password';
            pwdInput.type = isPassword ? 'text' : 'password';
            toggleIcon.className = isPassword ? 'bi bi-eye-slash' : 'bi bi-eye';
        });
    </script>
</body>
</html>
